       Replaces the Vite/TanStack scaffold's purple gaussian-blur starter logo. -->
  <rect width="32" height="32" rx="6" fill="#0d1211" />
  <g fill="none" stroke="#34d1c1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M13 9 H9 V23 H13" />
    <path d="M19 9 H23 V23 H19" />
  </g>
  <rect x="14" y="14" width="4" height="4" rx="1" fill="#34d1c1" />
</svg>
