# Hangar Bay - Main Docker Compose Orchestrator
#
# This file is the primary entry point for the Docker environment. Its sole
# responsibility is to define the shared, isolated networks used by all other
# services, in alignment with Zero Trust and Microsegmentation principles.
#
# It does not define any services itself. Services are defined in separate,
# feature-specific compose files (e.g., compose.dependencies.yml).
#
# --- NETWORK ARCHITECTURE ---
# The environment is segmented into three distinct networks to enforce the
# principle of least privilege, as outlined in design/specifications/security-spec.md.
#
# 1. hb-public-net:
#    - Purpose: Connects the frontend (Angular) and backend (FastAPI) containers.
#    - This is the only network the frontend can access.
#
# 2. hb-data-tier-net:
#    - Purpose: A private network for the backend to communicate with its data stores.
#    - Services: FastAPI App, PostgreSQL, Valkey.
#    - This isolates the database and cache from the public-facing and monitoring parts of the stack.
#
# 3. hb-monitoring-net:
#    - Purpose: A private network for the observability stack.
#    - Services: FastAPI App, Prometheus, Grafana.
#    - This allows monitoring tools to scrape the backend without gaining access to the data tier.
#
# The FastAPI application container is the only service connected to all three
# networks, acting as a secure, controlled bridge between them.
#
# --- USAGE ---
# To run the entire stack, combine this file with the service-specific files:
# docker compose -f compose.yml -f compose.dependencies.yml -f compose.observability.yml up -d --build

#

networks:
  hb-public-net:
    driver: bridge
    name: hb-public-net

  hb-data-tier-net:
    driver: bridge
    name: hb-data-tier-net

  hb-monitoring-net:
    driver: bridge
    name: hb-monitoring-net
