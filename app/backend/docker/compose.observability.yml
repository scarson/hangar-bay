# Hangar Bay - Observability Collection
#
# A single Grafana Alloy container ships backend telemetry to Grafana Cloud
# (org: scarson):
#   - scrapes the FastAPI /metrics endpoint on the HOST (dev runs the backend
#     as a host process on :8000, so the scrape target is host.docker.internal)
#   - tails the backend's JSON log file (app/backend/logs/, written when
#     LOG_FILE is set) and pushes it to Grafana Cloud Loki
#
# Visualization and storage live in Grafana Cloud; there is no local
# Prometheus or Grafana. Dashboards are committed JSON under
# app/backend/observability/dashboards/, provisioned with
# `pdm run provision-dashboards`.
#
# --- NETWORK CONNECTIONS ---
# Alloy sits alone on `hb-monitoring-net`, so it has no container-network
# path to the data tier. NOTE the honest limit of that isolation: Alloy is
# given `host.docker.internal` (required to scrape the host-run backend), and
# the data-tier services publish host ports (5432/6379), so the host gateway
# remains a reachable path. The network split reduces blast radius; it is not
# a hard boundary while the backend runs on the host.
#
# --- CREDENTIALS ---
# ./grafana-cloud.env (gitignored; template: ./grafana-cloud.env.example)
# carries ONLY the ingestion credentials Alloy needs. Dashboard-provisioning
# credentials live in ./grafana-cloud-provisioning.env (also gitignored) and
# are never injected into this container. Canonical copies in 1Password
# ("Grafana Cloud hangar-bay-*" items).

services:
  alloy:
    image: grafana/alloy:v1.17.1
    container_name: alloy
    ports:
      - "12345:12345"   # Alloy debug UI
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy/data
      - ../logs:/var/log/hangar-bay:ro
    env_file:
      - ./grafana-cloud.env
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - hb-monitoring-net

volumes:
  alloy_data: {}
