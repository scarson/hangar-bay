# Hangar Bay - Observability Stack
#
# This file manages auxiliary services for local development, specifically for
# observability: Prometheus for metrics collection and Grafana for visualization.
#
# --- NETWORK CONNECTIONS ---
# In line with the Zero Trust principle of Microsegmentation, these services
# are isolated on their own private network, `hb-monitoring-net`.
#
# - prometheus: Connects ONLY to `hb-monitoring-net`.
# - grafana: Connects ONLY to `hb-monitoring-net`.
#
# They can only communicate with each other and with the backend FastAPI app
# (which is also on this network), allowing Prometheus to scrape metrics and
# Grafana to query Prometheus. They have no direct network path to the data tier.

services:
  prometheus:
    image: prom/prometheus:v3.4.2
    container_name: hangar_bay_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'      
    networks:
      - hb-monitoring-net

  loki:
    image: grafana/loki:3.4.4
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki:/etc/loki
      - loki_data:/tmp/loki
    ports:
      - "3100:3100"
    networks:
      - hb-monitoring-net      

  grafana:
    image: grafana/grafana:12.0.2
    container_name: hangar_bay_grafana
    ports:
      - "3000:3000"
    environment:
      # Enable public dashboards for development - allows sharing dashboards without authentication
      # Useful for demos, external stakeholders, and development collaboration
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards      
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/:/etc/grafana/provisioning/
    networks:
      - hb-monitoring-net


  otel-collector:
    image: otel/opentelemetry-collector:latest
    command: ["--config=/etc/otel-collector/config.yaml"]
    volumes:
      - ./otel-collector:/etc/otel-collector
      - otel_data:/tmp/otel-collector
    ports:
      # - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks:
      - hb-monitoring-net
    depends_on:
      - prometheus
      - loki

volumes:
  prometheus_data: {}
  loki_data: {}
  grafana_data: {}
  otel_data: {}
