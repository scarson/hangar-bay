# ABOUTME: CI for Hangar Bay — backend pytest + frontend lint/types/unit/e2e-fixture.
# ABOUTME: Green CI is the merge gate the git-strategy merge-authority policy assumes.
name: CI

on:
  push:
    branches: [dev, main]
  # No branches filter on pull_request: that filter matches the PR's BASE branch,
  # and the stacked M2 phase PRs (the plan's Standing Orders §Phase sequencing —
  # docs/superpowers/plans/2026-07-12-m2-eve-sso.md) are based on the previous
  # phase's claude/* branch — a [dev, main] filter would leave every stacked PR
  # with no CI run at all (and a base retarget fires only an `edited` event,
  # which the default activity types don't run on).
  pull_request:

# Read-only: the only token use is listing a PR's changed files in `changes`.
permissions:
  contents: read
  pull-requests: read

# Rapid pushes to the same ref (stacked-PR rebases) supersede in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    # Which lanes does this PR actually need? This gates the JOBS rather than the
    # workflow, because a `paths-ignore` filter makes the checks vanish entirely —
    # indistinguishable from "CI never ran", which docs/git-strategy.md §Merge
    # authority instructs agents to treat as a failure. A job skipped by `if:`
    # reports as skipped with a visible reason, and still satisfies a required
    # status check if one is ever configured.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.classify.outputs.backend }}
      frontend: ${{ steps.classify.outputs.frontend }}
    steps:
      - name: Classify changed paths
        id: classify
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          run_everything() {
            echo 'backend=true'  >> "$GITHUB_OUTPUT"
            echo 'frontend=true' >> "$GITHUB_OUTPUT"
          }

          # Only pull_request narrows the lanes. Pushes to dev/main run everything:
          # CI's success on main is what fires deploy.yml's workflow_run chain, so a
          # narrowed push would strand production's reported commit behind main.
          if [ "$EVENT_NAME" != 'pull_request' ]; then
            echo "event=$EVENT_NAME — running every lane"
            run_everything; exit 0
          fi

          # A failed or empty file list must never silently skip a lane.
          if ! files=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename'); then
            echo '::warning::could not list the PR files — running every lane'
            run_everything; exit 0
          fi
          if [ -z "$files" ]; then
            echo '::warning::PR reports no changed files — running every lane'
            run_everything; exit 0
          fi

          echo "changed files:"; printf '  %s\n' $files

          backend=false
          frontend=false
          while IFS= read -r f; do
            # `case` globs match `/`, so a trailing `*` covers a whole subtree.
            case "$f" in
              # Prose and agent/editor tooling — no build or test consumes these.
              docs/*|design/*|plans/*|.claude/*|.windsurf/*|.beads/*|LICENSE) : ;;
              app/backend/*)      backend=true ;;
              app/frontend/web/*) frontend=true ;;
              *.md)
                # Root-level markdown is prose. Markdown nested anywhere else is
                # unclassified and falls through to the conservative default —
                # app/backend/pyproject.toml declares readme = "README.md", so a PR
                # deleting that file breaks `pdm install` and must still run CI.
                case "$f" in */*) backend=true; frontend=true ;; esac
                ;;
              # Anything unrecognized (root config, .github/*, render.yaml, or a new
              # top-level directory) is assumed to matter. New paths fail safe into
              # full CI rather than silently skipping it.
              *) backend=true; frontend=true ;;
            esac
          done <<< "$files"

          echo "backend=$backend"   | tee -a "$GITHUB_OUTPUT"
          echo "frontend=$frontend" | tee -a "$GITHUB_OUTPUT"

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app/backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hangar
          POSTGRES_PASSWORD: hangar
          POSTGRES_DB: hangar_bay
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U hangar"
          --health-interval 5s --health-timeout 5s --health-retries 20
      valkey:
        image: valkey/valkey:7.2
        ports: ['6379:6379']
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgresql+asyncpg://hangar:hangar@localhost:5432/hangar_bay
      DATABASE_URL_TESTS: postgresql+asyncpg://hangar:hangar@localhost:5432/hangar_bay_test
      CACHE_URL: redis://localhost:6379/0
      ESI_USER_AGENT: hangar-bay-ci (contact@example.com; CI)
      # Required with NO default on the PRE-SSO legacy Settings that conftest still
      # imports on this tree — must be JSON (ENV-1) or collection fails. Harmless after
      # Phase 1 (the consolidated class defaults it to [10000002]).
      AGGREGATION_REGION_IDS: "[10000002]"
      # Throwaway Fernet key — encrypts only ephemeral tokens in a throwaway CI DB.
      # Inert on the pre-SSO tree (unknown env vars are ignored by pydantic-settings;
      # only unknown .env-FILE keys crash — and CI provides no .env). Declared as a
      # real field from Phase 1 onward. Regenerate any time with:
      #   python -c "import base64,os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())"
      TOKEN_CIPHER_KEYS: 1ENT-BXzxzKxMdnIhMN-Q-_LVIGorE-Stwjy1-FECkA=
    steps:
      - uses: actions/checkout@v7
      # Both python-version pins below MUST stay in sync (setup-python + setup-pdm).
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: '3.14'
      - name: Create the tests database
        run: PGPASSWORD=hangar psql -h localhost -U hangar -d hangar_bay -c 'CREATE DATABASE hangar_bay_test;'
      - name: Install backend deps
        run: pdm install -G dev
      - name: Lint
        run: pdm run lint
      - name: Run backend tests
        run: pdm run pytest

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: app/frontend/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: app/frontend/web/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Lint
        run: npx eslint .
      - name: Typecheck
        run: npx tsc -b
      - name: Unit tests
        run: npm run test
      - name: Cache Playwright browsers
        uses: actions/cache@v6
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/frontend/web/package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: E2E (fixture lane)
        run: npm run e2e
      # playwright.config.ts sets trace: retain-on-failure — keep those traces
      # when the lane fails, or they die with the runner.
      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: app/frontend/web/test-results/
          if-no-files-found: ignore
          retention-days: 7

  openapi-drift:
    # The committed openapi.json / schema.d.ts must match what the backend exports —
    # neither existing job runs the export chain, so drift was previously invisible.
    # Straddles both lanes: the backend produces the schema, the frontend holds the
    # committed copies and the generator that renders them.
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: '3.14'
      - name: Install backend deps
        working-directory: app/backend
        run: pdm install -G dev
      - name: Export OpenAPI schema
        working-directory: app/backend
        run: pdm run export-openapi
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: app/frontend/web/package-lock.json
      - name: Regenerate typed client
        working-directory: app/frontend/web
        run: npm ci && npm run generate:api
      - name: Fail on drift
        run: |
          git diff --exit-code -- app/frontend/web/openapi.json app/frontend/web/src/lib/api/schema.d.ts \
            || { echo '::error::openapi.json / schema.d.ts are stale — run pdm run export-openapi && npm run generate:api and commit'; exit 1; }
